<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lounge Lyzard</title>
  <meta name="description" content="Lounge Lyzard is currently under maintenance.">
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#0b1220;
      color:white;
      min-height:100vh;
      overflow:hidden;
    }

    .hero{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 20px;
      box-sizing:border-box;
    }

    .bg-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:.22;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to bottom, rgba(11,18,32,.70), rgba(11,18,32,.88));
    }

    .content{
      position:relative;
      z-index:2;
      max-width:760px;
      width:100%;
    }

    h1{
      font-size:58px;
      margin:0 0 18px 0;
      line-height:1.05;
    }

    p{
      font-size:22px;
      line-height:1.6;
      margin:0 auto 18px auto;
      max-width:680px;
      opacity:.95;
    }

    .sub{
      font-size:16px;
      opacity:.72;
      margin-top:28px;
    }

    .gate-box{
      margin:40px auto 0 auto;
      max-width:520px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:28px 24px;
      box-shadow:0 20px 40px rgba(0,0,0,.35);
      backdrop-filter: blur(6px);
    }

    .gate-box h2{
      margin:0 0 18px 0;
      font-size:26px;
    }

    .form-row{
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
      flex-wrap:wrap;
    }

    input{
      width:260px;
      max-width:100%;
      padding:14px 16px;
      font-size:16px;
      border-radius:10px;
      border:none;
      outline:none;
      background:#f8fafc;
      color:#111827;
      box-sizing:border-box;
    }

    button{
      padding:14px 24px;
      font-size:16px;
      font-weight:bold;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:#22c55e;
      color:white;
    }

    button:hover{
      background:#16a34a;
    }

    #msg{
      min-height:22px;
      margin-top:16px;
      font-size:15px;
      opacity:.88;
    }

    .hint{
      margin-top:12px;
      font-size:13px;
      opacity:.55;
    }

    @media (max-width:700px){
      h1{
        font-size:42px;
      }

      p{
        font-size:19px;
      }

      .gate-box{
        padding:22px 18px;
      }

      .form-row{
        flex-direction:column;
      }

      input{
        width:100%;
      }

      button{
        width:100%;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <video class="bg-video" autoplay muted loop playsinline preload="none">
      <source src="video3_lounge.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
      <h1>🦎 Lounge Lyzard</h1>

      <p>
        The Lyzard is currently relaxing in the lounge while we make a few upgrades.
      </p>

      <p>
        We’ll be back shortly.
      </p>

      <div class="gate-box">
        <h2>Private Preview Access</h2>

        <div class="form-row">
          <input
            type="password"
            id="pw"
            placeholder="Enter preview password"
            autocomplete="off"
          >
          <button onclick="checkPassword()">Enter</button>
        </div>

        <div id="msg"></div>
        <div class="hint">Preview access is for development only.</div>
      </div>

      <p class="sub">
        Built by a frequent traveler starting at ATL.
      </p>
    </div>
  </section>

  <script>
    function checkPassword() {
      var pw = document.getElementById("pw").value.trim();
      var msg = document.getElementById("msg");

      if (pw === "$h@wni$#1") {
        window.location.href = "/dev.html";
      } else if (pw.length === 0) {
        msg.innerText = "Enter the preview password.";
      } else {
        msg.innerText = "Incorrect password.";
      }
    }

    document.getElementById("pw").addEventListener("keydown", function(e){
      if(e.key === "Enter"){
        checkPassword();
      }
    });
  </script>

</body>
</html>
